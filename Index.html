<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Für meine Schwester</title>
<style>
body {
  margin:0; height:100vh; overflow:hidden;
  background:linear-gradient(135deg,#b3e5fc,#e1f5fe);
  font-family:'Comic Sans MS',cursive; 
  display:flex; flex-direction:column; justify-content:center; align-items:center;
}
h1 {color:#01579b; font-size:2em; text-align:center; text-shadow:2px 2px 6px white; 
    margin:10px 0; z-index:999; position:relative;}

.corner-img {
  position:absolute; width:110px; height:140px;
  border-radius:20px; box-shadow:0 4px 15px rgba(0,0,0,0.3);
  object-fit:cover; z-index:1;
}
.top-left {top:10px; left:10px;}
.top-right {top:10px; right:10px;}
.bottom-left {bottom:15px; left:10px;}
.bottom-right {bottom:15px; right:10px;}

.center-img {width:210px; border-radius:25px; margin:15px 0; z-index:5;}

.cat-box {
  display:none; position:absolute; bottom:15px; left:10px;
  width:110px; height:140px; border-radius:20px; object-fit:cover; z-index:5;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.button-group {display:flex; flex-direction:column; gap:12px; z-index:999; position:relative;}
button {
  padding:14px 28px; font-size:1.1em; border:none; border-radius:30px; 
  background:#29b6f6; color:white; cursor:pointer;
}
#btn2 {display:none;}
</style>
</head>
<body>

<img src="https://i.imgur.com/9309Z6i.jpg" class="corner-img top-left">
<img src="https://i.imgur.com/ynwNBQ3.jpg" class="corner-img top-right">
<img src="https://i.imgur.com/nNVdXBZ.jpg" class="corner-img bottom-left">
<img src="https://i.imgur.com/Ry2Tv9p.jpg" class="corner-img bottom-right"> 

<h1>Alles Gute zum Geburtstag<br>liebe Schwesterherz! 🎂</h1>
<img src="https://i.imgur.com/2XDfaGL.jpeg" class="center-img">

<div class="button-group">
  <button onclick="showSecond()">Klick mich</button>
  <button id="btn2" onclick="document.getElementById('cat').style.display='block'">Übrigens das bist du 😅</button>
</div>

<img id="cat" src="https://i.imgur.com/7wYop29.jpeg" class="cat-box">

<script>
function showSecond() {
  alert('Ich hab dich ganz doll lieb! 🫶');
  document.getElementById('btn2').style.display = 'block';
}
</script>
</body>
</html>
